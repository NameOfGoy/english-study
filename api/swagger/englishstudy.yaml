      - https
      summary: 字典模块/例句更新
  /api/v1/dictionary/phrase/list:
    get:
      operationId: dictionaryGetWordPhraseList
      parameters:
      - default: 0
        in: query
        name: offset
        required: true
        type: integer
      - default: 10
        in: query
        name: limit
        required: true
        type: integer
      - allowEmptyValue: true
        in: query
        name: orderby
        type: string
      - default: asc
        in: query
        name: sort
        required: true
        type: string
      - description: 单词ID列表
        in: query
        items:
          type: integer
        name: word_id
        required: true
        type: array
      - description: 短语前缀
        in: query
        name: phrase_prefix
        required: true
        type: string
      - description: 中文翻译
        in: query
        name: translation
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              data:
                items:
                  properties:
                    id:
                      type: integer
                    word:
                      description: 单词
                      type: string
                  required:
                  - id
                  - word
                  type: object
                type: array
              limit:
