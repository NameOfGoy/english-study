      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              example:
                description: 例句
                properties:
                  example:
                    description: 例句
                    type: string
                  translation:
                    description: 中文翻译
                    type: string
                required:
                - example
                - translation
                type: object
              message:
                description: 错误信息
                type: string
              reason:
                description: 错误原因
                type: string
            type: object
      schemes:
      - https
      summary: 字典模块/例句生成
  /api/v1/dictionary/phrase/example/update:
    post:
