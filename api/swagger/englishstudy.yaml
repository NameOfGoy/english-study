  /api/v1/dictionary/word/add:
    post:
      consumes:
      - application/json
      operationId: dictionaryAddWord
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            is_generate_picture:
              description: 是否生成图片
              type: boolean
            pos:
              description: 词性
              items:
                properties:
                  example:
                    description: 例句, 一个元素是一个句子, 通过\n分割例句和中文翻译
                    items:
                      properties:
                        example:
                          description: 例句
                          type: string
                        translation:
                          description: 中文翻译
                          type: string
                      required:
                      - example
                      - translation
                      type: object
                    type: array
                  exchange:
                    additionalProperties:
                      type: string
                    description: 变化形式, key是变化形式简写, value是变化形式的单词, 例如单词do, p:did, d:done,
                      i:doing, 3:does
                    type: object
                  id:
                    description: 自定义的词性, id 从100W开始
                    type: integer
                  picture:
                    description: 图片
                    type: string
                  pos:
                    description: 词性
                    type: integer
                  translation:
                    description: 中文翻译
                    type: string
                  word:
                    description: 单词
                    type: string
                  word_id:
                    description: 单词ID
                    type: integer
                required:
                - id
                - word_id
                - word
                - pos
                - translation
                - example
                - picture
                - exchange
                type: object
              type: array
            uk_audio:
              description: 英式音频
              type: string
            uk_phonetic:
              description: 英式音标
              type: string
            us_audio:
              description: 美式音频
              type: string
            us_phonetic:
              description: 美式音标
              type: string
            word:
              description: 单词
              type: string
          required:
          - word
          - uk_phonetic
          - uk_audio
          - us_phonetic
          - us_audio
          - pos
          - is_generate_picture
          type: object
