                        translation:
                          description: 中文翻译
                          type: string
                      required:
                      - example
                      - translation
                      type: object
                    type: array
                  id:
                    description: 短语ID
                    type: integer
                  phrase:
                    description: 短语
                    type: string
                  picture:
                    description: 图片
                    type: string
                  pronunciation:
                    description: 发音
                    type: string
                  translation:
                    description: 中文翻译
                    type: string
                required:
