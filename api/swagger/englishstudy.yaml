basePath: /
consumes:
- application/json
info:
  title: english-study-api
  version: v1
paths:
  /api/v1/dictionary/operation/export:
    post:
      consumes:
      - application/x-www-form-urlencoded
      operationId: dictionaryExportWord
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              file_path:
                description: 文件路径
                type: string
              message:
                description: 错误信息
                type: string
              reason:
                description: 错误原因
                type: string
            type: object
      schemes:
      - https
      summary: 字典模块/批量导出
  /api/v1/dictionary/operation/import:
    post:
      consumes:
      - application/json
      operationId: dictionaryImportWord
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            file_path:
              description: 文件路径
              type: string
          required:
          - file_path
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              message:
                description: 错误信息
                type: string
              reason:
                description: 错误原因
                type: string
            type: object
      schemes:
      - https
      summary: 字典模块/批量导入
  /api/v1/dictionary/phrase/add:
    post:
      consumes:
      - application/json
      operationId: dictionaryAddWordPhrase
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            example:
              description: 例句
              items:
                properties:
                  example:
                    description: 例句
                    type: string
                  translation:
                    description: 中文翻译
                    type: string
                required:
                - example
                - translation
                type: object
              type: array
            is_generate_picture:
              description: 是否生成图片
              type: boolean
            phrase:
              description: 短语
              type: string
            picture:
              description: 图片
              type: string
            pronunciation:
              description: 发音
              type: string
            translation:
              description: 中文翻译
              type: string
          required:
          - phrase
          - translation
          - pronunciation
          - example
          - picture
          - is_generate_picture
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              message:
                description: 错误信息
                type: string
              reason:
                description: 错误原因
                type: string
            type: object
      schemes:
      - https
      summary: 字典模块/添加短语
  /api/v1/dictionary/phrase/delete:
    delete:
      consumes:
      - application/json
      operationId: dictionaryDeleteWordPhrase
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            id:
              description: 短语ID
              type: integer
          required:
          - id
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              message:
                description: 错误信息
                type: string
              reason:
                description: 错误原因
                type: string
            type: object
      schemes:
      - https
      summary: 字典模块/删除短语
  /api/v1/dictionary/phrase/detail:
    get:
      operationId: dictionaryGetWordPhraseDetail
      parameters:
      - description: 短语ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: ""
          schema:
            properties:
              code:
                description: 状态码
                type: integer
              data:
                properties:
                  example:
                    description: 例句
                    items:
                      properties:
                        example:
                          description: 例句
